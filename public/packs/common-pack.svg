<svg width="640" height="900" viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Common Pack</title>
  <desc id="desc">Bronze common card pack artwork in the epic vertical format.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1722"/>
      <stop offset="55%" stop-color="#3a2e24"/>
      <stop offset="100%" stop-color="#6b4f32"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d8ab"/>
      <stop offset="50%" stop-color="#c9965a"/>
      <stop offset="100%" stop-color="#8d6338"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#f8ead4" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#f8ead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="640" height="900" rx="36" fill="url(#bg)"/>
  <rect x="24" y="24" width="592" height="852" rx="28" fill="none" stroke="#f2c98f" stroke-opacity="0.62" stroke-width="4"/>
  <ellipse cx="180" cy="170" rx="220" ry="180" fill="url(#shine)"/>

  <g fill="none" stroke="#f3d8b3" stroke-opacity="0.72" stroke-width="6">
    <path d="M120 180 L320 100 L520 180 L520 420 L320 500 L120 420 Z"/>
    <path d="M165 250 L320 190 L475 250 L475 380 L320 440 L165 380 Z" stroke-opacity="0.48"/>
  </g>

  <g transform="translate(320 326)">
    <circle r="82" fill="none" stroke="#f0c78f" stroke-opacity="0.62" stroke-width="5"/>
    <path d="M-48 -44 L-2 18" fill="none" stroke="url(#foil)" stroke-width="12" stroke-linecap="round"/>
    <path d="M48 -44 L2 18" fill="none" stroke="url(#foil)" stroke-width="12" stroke-linecap="round"/>
    <path d="M-30 24 L0 -24 L30 24" fill="none" stroke="#f3e3ca" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle r="12" fill="#f2d6ad"/>
  </g>

  <g fill="#f7ebdb">
    <circle cx="258" cy="236" r="4"/>
    <circle cx="284" cy="220" r="4"/>
    <circle cx="320" cy="214" r="4"/>
    <circle cx="356" cy="220" r="4"/>
    <circle cx="382" cy="236" r="4"/>
  </g>

  <g fill="#f8eee0" font-family="Rajdhani, sans-serif" text-anchor="middle">
    <text x="320" y="660" font-size="72" font-weight="700" letter-spacing="8">COMMON</text>
    <text x="320" y="728" font-size="40" font-weight="600" letter-spacing="6">TRIPLE TRIAD</text>
  </g>

  <circle cx="320" cy="570" r="28" fill="#f7e6cf" fill-opacity="0.94"/>
  <circle cx="320" cy="570" r="14" fill="#ab7540"/>
