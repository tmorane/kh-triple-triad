    <circle r="76" fill="#efefef" stroke="#161616" stroke-width="6"/>
    <path d="M-76 0 A76 76 0 0 1 76 0 L76 -76 L-76 -76 Z" fill="#e4373c"/>
    <rect x="-76" y="-6" width="152" height="12" fill="#171717"/>
