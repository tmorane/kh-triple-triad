<svg width="640" height="900" viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Common Pack</title>
  <desc id="desc">Pokemon-inspired common booster pack with Pokeball emblem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171728"/>
      <stop offset="58%" stop-color="#45252f"/>
      <stop offset="100%" stop-color="#8e2f30"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe2b3"/>
      <stop offset="100%" stop-color="#d89a57"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="44%">
      <stop offset="0%" stop-color="#ffcf90" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffcf90" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="640" height="900" rx="36" fill="url(#bg)"/>
  <rect x="18" y="18" width="604" height="864" rx="28" fill="none" stroke="#f2d0a2" stroke-opacity="0.48" stroke-width="3"/>
  <ellipse cx="320" cy="360" rx="250" ry="200" fill="url(#glow)"/>

  <g stroke="#ffd7a5" stroke-opacity="0.5" fill="none">
    <path d="M64 190 L576 190"/>
    <path d="M64 530 L576 530"/>
    <path d="M126 118 L514 118 L566 170 L566 550 L514 602 L126 602 L74 550 L74 170 Z" stroke-width="3"/>
  </g>

  <g transform="translate(320 330)">
