<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Common Pack Artwork</title>
  <desc id="desc">A bronze KH Triple Triad card pack with crossed blades and six stars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b262f"/>
      <stop offset="55%" stop-color="#233746"/>
      <stop offset="100%" stop-color="#15232d"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4d39c"/>
      <stop offset="50%" stop-color="#c49b61"/>
      <stop offset="100%" stop-color="#8e693f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0%" stop-color="#efd5a8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#efd5a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="420" rx="26" fill="url(#bg)"/>
  <rect x="12" y="12" width="696" height="396" rx="22" fill="none" stroke="#b38c58" stroke-opacity="0.75"/>
  <rect x="26" y="26" width="668" height="368" rx="18" fill="url(#glow)"/>

  <g transform="translate(360 190)">
    <circle r="98" fill="#17242e" stroke="#d7b27a" stroke-width="8"/>
    <circle r="74" fill="none" stroke="#d7b27a" stroke-opacity="0.55" stroke-width="3"/>
    <path d="M-42 -36 L0 28 L42 -36" fill="none" stroke="url(#foil)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-36 34 L0 -18 L36 34" fill="none" stroke="#f2debf" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle r="14" fill="#d7b27a"/>
  </g>

  <g fill="#ebd8b7">
    <circle cx="228" cy="108" r="6"/>
    <circle cx="264" cy="86" r="6"/>
    <circle cx="300" cy="70" r="6"/>
    <circle cx="420" cy="70" r="6"/>
    <circle cx="456" cy="86" r="6"/>
    <circle cx="492" cy="108" r="6"/>
  </g>

  <text x="360" y="326" text-anchor="middle" fill="#f3e0c2" font-family="Cinzel, serif" font-size="58" font-weight="700" letter-spacing="7">COMMON</text>
  <text x="360" y="360" text-anchor="middle" fill="#ccb28b" font-family="Rajdhani, sans-serif" font-size="24" font-weight="700" letter-spacing="4">FOUNDATION SERIES</text>
</svg>
