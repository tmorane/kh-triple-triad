  </g>

  <g fill="#f6eee4" font-family="Rajdhani, sans-serif" text-anchor="middle">
    <text x="320" y="664" font-size="72" font-weight="700" letter-spacing="8">COMMON</text>
    <text x="320" y="730" font-size="40" font-weight="600" letter-spacing="6">TRIPLE TRIAD</text>
