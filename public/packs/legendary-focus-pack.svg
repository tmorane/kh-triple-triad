    <circle r="62" fill="none" stroke="#f8cc7d" stroke-opacity="0.58" stroke-width="6"/>
    <circle r="38" fill="none" stroke="#f5c26a" stroke-opacity="0.64" stroke-width="4"/>
    <path d="M-74 0 H74 M0 -74 V74" stroke="#f9d18b" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M-56 28 H56 V52 H-56 Z" fill="url(#foil)"/>
    <path d="M-70 20 L-42 -28 L0 8 L42 -28 L70 20" fill="none" stroke="url(#foil)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-42" cy="-28" r="8" fill="#ffe7b8"/>
