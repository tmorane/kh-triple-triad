    <circle cx="274" cy="224" r="4"/>
    <circle cx="298" cy="214" r="4"/>
    <circle cx="320" cy="210" r="4"/>
    <circle cx="342" cy="214" r="4"/>
    <circle cx="366" cy="224" r="4"/>
    <circle cx="394" cy="240" r="4"/>
