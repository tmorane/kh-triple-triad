<svg width="640" height="900" viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Legendary Focus Pack</title>
  <desc id="desc">A radiant target-themed pack for legendary focus openings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#281914"/>
      <stop offset="46%" stop-color="#614022"/>
      <stop offset="100%" stop-color="#d08c3e"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2cf"/>
      <stop offset="52%" stop-color="#f5c875"/>
      <stop offset="100%" stop-color="#d58d34"/>
    </linearGradient>
    <radialGradient id="shine" cx="32%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#ffeec5" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#ffeec5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="640" height="900" rx="36" fill="url(#bg)"/>
  <rect x="24" y="24" width="592" height="852" rx="28" fill="none" stroke="#ffd892" stroke-opacity="0.68" stroke-width="4"/>
  <ellipse cx="178" cy="165" rx="220" ry="182" fill="url(#shine)"/>

  <g fill="none" stroke="#ffe8c2" stroke-opacity="0.76" stroke-width="6">
