  <g fill="#fff3dc" font-family="Rajdhani, sans-serif" text-anchor="middle">
    <text x="320" y="638" font-size="62" font-weight="700" letter-spacing="7">LEGENDARY</text>
    <text x="320" y="700" font-size="52" font-weight="700" letter-spacing="6">FOCUS PACK</text>
