<svg width="640" height="900" viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Epic Pack</title>
  <desc id="desc">Purple epic card pack artwork.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1538"/>
      <stop offset="55%" stop-color="#4b2f7f"/>
      <stop offset="100%" stop-color="#8d58cf"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#f0deff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f0deff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="640" height="900" rx="36" fill="url(#bg)"/>
  <rect x="24" y="24" width="592" height="852" rx="28" fill="none" stroke="#e2c4ff" stroke-opacity="0.65" stroke-width="4"/>
  <ellipse cx="180" cy="170" rx="220" ry="180" fill="url(#shine)"/>

  <g fill="none" stroke="#f1ddff" stroke-opacity="0.75" stroke-width="6">
    <path d="M120 180 L320 100 L520 180 L520 420 L320 500 L120 420 Z"/>
    <path d="M165 250 L320 190 L475 250 L475 380 L320 440 L165 380 Z" stroke-opacity="0.5"/>
  </g>

  <g fill="#f7ebff" font-family="Rajdhani, sans-serif" text-anchor="middle">
    <text x="320" y="660" font-size="72" font-weight="700" letter-spacing="8">EPIC</text>
    <text x="320" y="728" font-size="40" font-weight="600" letter-spacing="6">TRIPLE TRIAD</text>
  </g>

  <circle cx="320" cy="570" r="28" fill="#f5e2ff" fill-opacity="0.95"/>
  <circle cx="320" cy="570" r="14" fill="#9d67db"/>
</svg>
