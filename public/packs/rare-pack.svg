<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rare Pack Artwork</title>
  <desc id="desc">A sapphire KH Triple Triad pack with a celestial lens crest.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132335"/>
      <stop offset="55%" stop-color="#1c3354"/>
      <stop offset="100%" stop-color="#122334"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bdd7ff"/>
      <stop offset="50%" stop-color="#7098df"/>
