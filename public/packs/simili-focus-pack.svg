<svg width="640" height="900" viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Simili Focus Pack</title>
  <desc id="desc">A spectral silver-blue focus pack themed around Simili units.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101a2e"/>
      <stop offset="52%" stop-color="#1f2f56"/>
      <stop offset="100%" stop-color="#2c4f83"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf5ff"/>
      <stop offset="52%" stop-color="#b7d0ff"/>
      <stop offset="100%" stop-color="#6f95d6"/>
    </linearGradient>
    <radialGradient id="shine" cx="32%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#ebf2ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ebf2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="640" height="900" rx="36" fill="url(#bg)"/>
  <rect x="24" y="24" width="592" height="852" rx="28" fill="none" stroke="#c6d8ff" stroke-opacity="0.66" stroke-width="4"/>
  <ellipse cx="178" cy="166" rx="220" ry="182" fill="url(#shine)"/>

  <g fill="none" stroke="#e8f0ff" stroke-opacity="0.76" stroke-width="6">
    <path d="M120 180 L320 100 L520 180 L520 420 L320 500 L120 420 Z"/>
    <path d="M165 250 L320 190 L475 250 L475 380 L320 440 L165 380 Z" stroke-opacity="0.5"/>
  </g>

  <g transform="translate(320 322)">
    <circle r="84" fill="none" stroke="#b5ccff" stroke-opacity="0.62" stroke-width="5"/>
    <circle r="52" fill="none" stroke="#9fbfff" stroke-opacity="0.52" stroke-width="7"/>
    <path d="M0 -72 L16 -16 L72 0 L16 16 L0 72 L-16 16 L-72 0 L-16 -16 Z" fill="url(#foil)" fill-opacity="0.98"/>
    <path d="M-56 0 C-34 -12 -12 -34 0 -56 C12 -34 34 -12 56 0 C34 12 12 34 0 56 C-12 34 -34 12 -56 0 Z" fill="none" stroke="#d9e7ff" stroke-opacity="0.72" stroke-width="4"/>
    <circle r="10" fill="#f3f8ff"/>
  </g>

  <g fill="#edf3ff">
    <circle cx="252" cy="236" r="4"/>
    <circle cx="280" cy="220" r="4"/>
    <circle cx="320" cy="214" r="4"/>
    <circle cx="360" cy="220" r="4"/>
    <circle cx="388" cy="236" r="4"/>
  </g>

  <g fill="#f2f6ff" font-family="Rajdhani, sans-serif" text-anchor="middle">
    <text x="320" y="644" font-size="72" font-weight="700" letter-spacing="8">SIMILI</text>
    <text x="320" y="706" font-size="52" font-weight="700" letter-spacing="6">FOCUS PACK</text>
    <text x="320" y="758" font-size="34" font-weight="600" letter-spacing="6">TRIPLE TRIAD</text>
  </g>

  <circle cx="320" cy="558" r="28" fill="#e8f0ff" fill-opacity="0.95"/>
  <path d="M320 542 L332 558 L320 574 L308 558 Z" fill="#6b8ecf"/>
  <circle cx="320" cy="558" r="6" fill="#f0f6ff"/>
