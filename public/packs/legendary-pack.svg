<svg width="640" height="900" viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Legendary Pack</title>
  <desc id="desc">Radiant legendary card pack artwork in the epic vertical format.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#28191a"/>
      <stop offset="48%" stop-color="#624124"/>
      <stop offset="100%" stop-color="#be7128"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1c7"/>
      <stop offset="50%" stop-color="#f6c36d"/>
      <stop offset="100%" stop-color="#d08a36"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ffeec3" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#ffeec3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="640" height="900" rx="36" fill="url(#bg)"/>
  <rect x="24" y="24" width="592" height="852" rx="28" fill="none" stroke="#ffd28b" stroke-opacity="0.68" stroke-width="4"/>
  <ellipse cx="180" cy="170" rx="220" ry="180" fill="url(#shine)"/>

  <g fill="none" stroke="#ffe8be" stroke-opacity="0.76" stroke-width="6">
    <path d="M120 180 L320 100 L520 180 L520 420 L320 500 L120 420 Z"/>
    <path d="M165 250 L320 190 L475 250 L475 380 L320 440 L165 380 Z" stroke-opacity="0.52"/>
  </g>

  <g transform="translate(320 326)">
    <circle r="84" fill="none" stroke="#ffd89b" stroke-opacity="0.62" stroke-width="5"/>
    <path d="M-56 34 H56 V56 H-56 Z" fill="url(#foil)"/>
    <path d="M-70 26 L-42 -26 L0 10 L42 -26 L70 26" fill="none" stroke="url(#foil)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-42" cy="-26" r="8" fill="#ffe6b7"/>
    <circle cx="0" cy="10" r="9" fill="#ffe6b7"/>
    <circle cx="42" cy="-26" r="8" fill="#ffe6b7"/>
    <circle cx="0" cy="-42" r="9" fill="#ffe6b7"/>
  </g>

  <g fill="#fff1d4">
    <circle cx="246" cy="240" r="4"/>
    <circle cx="274" cy="224" r="4"/>
    <circle cx="298" cy="214" r="4"/>
    <circle cx="320" cy="210" r="4"/>
    <circle cx="342" cy="214" r="4"/>
    <circle cx="366" cy="224" r="4"/>
    <circle cx="394" cy="240" r="4"/>
  </g>

  <g fill="#fff3dc" font-family="Rajdhani, sans-serif" text-anchor="middle">
    <text x="320" y="660" font-size="64" font-weight="700" letter-spacing="7">LEGENDARY</text>
    <text x="320" y="728" font-size="40" font-weight="600" letter-spacing="6">TRIPLE TRIAD</text>
  </g>

  <circle cx="320" cy="570" r="28" fill="#ffedc8" fill-opacity="0.95"/>
  <circle cx="320" cy="570" r="14" fill="#d78934"/>
