<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Legendary Pack Artwork</title>
  <desc id="desc">A radiant legendary KH Triple Triad pack with a crown sigil and aurora flare.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1b1d"/>
      <stop offset="45%" stop-color="#3e2f1f"/>
      <stop offset="100%" stop-color="#1f1517"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe6ad"/>
      <stop offset="50%" stop-color="#f0b44e"/>
      <stop offset="100%" stop-color="#c67e28"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0%" stop-color="#ffd68b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd68b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="720" height="420" rx="26" fill="url(#bg)"/>
  <rect x="12" y="12" width="696" height="396" rx="22" fill="none" stroke="#e0aa58" stroke-opacity="0.92"/>
  <rect x="26" y="26" width="668" height="368" rx="18" fill="url(#glow)"/>

  <g transform="translate(360 188)">
    <circle r="104" fill="#241b1f" stroke="#f0bf6d" stroke-width="8"/>
    <circle r="78" fill="none" stroke="#f0bf6d" stroke-opacity="0.62" stroke-width="3"/>
    <path d="M-44 30 H44 V52 H-44 Z" fill="url(#foil)"/>
    <path d="M-56 24 L-34 -20 L0 8 L34 -20 L56 24" fill="none" stroke="url(#foil)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-34" cy="-20" r="8" fill="#ffdfa5"/>
    <circle cx="0" cy="8" r="9" fill="#ffdfa5"/>
    <circle cx="34" cy="-20" r="8" fill="#ffdfa5"/>
    <circle cx="0" cy="-34" r="9" fill="#ffdfa5"/>
  </g>

  <g fill="#ffe4b1">
    <circle cx="212" cy="110" r="6"/>
    <circle cx="250" cy="86" r="6"/>
    <circle cx="288" cy="68" r="6"/>
    <circle cx="326" cy="58" r="6"/>
    <circle cx="394" cy="58" r="6"/>
    <circle cx="432" cy="68" r="6"/>
    <circle cx="470" cy="86" r="6"/>
    <circle cx="508" cy="110" r="6"/>
  </g>

  <text x="360" y="326" text-anchor="middle" fill="#fff0cf" font-family="Cinzel, serif" font-size="54" font-weight="700" letter-spacing="7">LEGENDARY</text>
  <text x="360" y="360" text-anchor="middle" fill="#f5cc84" font-family="Rajdhani, sans-serif" font-size="24" font-weight="700" letter-spacing="4">CROWN ASCENDANT</text>
