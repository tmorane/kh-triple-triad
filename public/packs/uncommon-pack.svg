<svg width="640" height="900" viewBox="0 0 640 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Uncommon Pack</title>
  <desc id="desc">Emerald uncommon card pack artwork in the epic vertical format.</desc>
  <defs>
