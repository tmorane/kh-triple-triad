<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mode 4X4 Normal</title>
  <desc id="desc">Stylized game mode card inspired by JRPG menu aesthetics for 4X4 normal mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071f1b"/>
      <stop offset="42%" stop-color="#0f3f3a"/>
      <stop offset="100%" stop-color="#1a8167"/>
    </linearGradient>
    <radialGradient id="mist" cx="70%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#94ffe4" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#94ffe4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7fff4"/>
      <stop offset="50%" stop-color="#92f5dc"/>
      <stop offset="100%" stop-color="#edfff8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#mist)"/>
  <circle cx="1240" cy="210" r="190" fill="#8fffe5" opacity="0.16"/>
  <circle cx="1210" cy="240" r="235" fill="#a6fff0" opacity="0.08"/>

  <rect x="70" y="70" width="1460" height="760" rx="34" fill="none" stroke="url(#frame)" stroke-width="6"/>
  <rect x="92" y="92" width="1416" height="716" rx="25" fill="none" stroke="#d8fff4" stroke-opacity="0.35" stroke-width="2"/>

  <g transform="translate(800 120)" filter="url(#glow)">
    <path d="M0 18c20-24 58-24 78 0 19 23 15 54-17 80L0 148l-61-50c-32-26-36-57-17-80 20-24 58-24 78 0z" fill="#e7fff8" opacity="0.92"/>
    <rect x="-10" y="148" width="20" height="48" rx="9" fill="#e7fff8"/>
    <circle cx="0" cy="212" r="15" fill="#e7fff8"/>
    <polygon points="-54,-28 -35,-4 -69,-4" fill="#e7fff8"/>
    <polygon points="54,-28 35,-4 69,-4" fill="#e7fff8"/>
    <polygon points="0,-36 15,-10 -15,-10" fill="#e7fff8"/>
  </g>

  <text x="130" y="165" fill="#e5fff8" font-size="42" font-family="Georgia, 'Times New Roman', serif" letter-spacing="7">GAME MODE</text>

  <g>
    <rect x="130" y="200" width="560" height="500" rx="28" fill="#072a23" fill-opacity="0.42" stroke="#ccfff2" stroke-opacity="0.45"/>
    <text x="185" y="295" fill="#e2fff7" font-size="56" font-family="Georgia, 'Times New Roman', serif" letter-spacing="5">TRIAD FORMAT</text>
    <text x="185" y="435" fill="#ffffff" font-size="170" font-family="Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="8">4X4</text>
    <rect x="185" y="495" width="340" height="3" fill="#a8ffe6" opacity="0.8"/>
    <text x="185" y="585" fill="#a8ffe6" font-size="56" font-family="Georgia, 'Times New Roman', serif" letter-spacing="8">NORMAL</text>
    <text x="185" y="640" fill="#d5fff3" font-size="24" font-family="Georgia, 'Times New Roman', serif" letter-spacing="2">8 cards per side  ·  16 tactical cells</text>
  </g>

  <g>
    <rect x="760" y="180" width="700" height="540" rx="28" fill="#041d17" fill-opacity="0.44" stroke="#ccfff2" stroke-opacity="0.45"/>
    <text x="820" y="260" fill="#e4fff8" font-size="42" font-family="Georgia, 'Times New Roman', serif" letter-spacing="6">BOARD PREVIEW</text>
    <g transform="translate(868 288)">
      <rect x="0" y="0" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="112" y="0" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="224" y="0" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="336" y="0" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>

      <rect x="0" y="112" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="112" y="112" width="92" height="92" rx="14" fill="#115749" stroke="#cafff2" stroke-width="2"/>
      <rect x="224" y="112" width="92" height="92" rx="14" fill="#115749" stroke="#cafff2" stroke-width="2"/>
      <rect x="336" y="112" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>

      <rect x="0" y="224" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="112" y="224" width="92" height="92" rx="14" fill="#115749" stroke="#cafff2" stroke-width="2"/>
      <rect x="224" y="224" width="92" height="92" rx="14" fill="#115749" stroke="#cafff2" stroke-width="2"/>
      <rect x="336" y="224" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>

      <rect x="0" y="336" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="112" y="336" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="224" y="336" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
      <rect x="336" y="336" width="92" height="92" rx="14" fill="#0f4a3e" stroke="#a6ffe9"/>
    </g>
  </g>

  <text x="130" y="785" fill="#d9fff5" font-size="23" font-family="Georgia, 'Times New Roman', serif" letter-spacing="3">KINGDOM TRIALS // SELECT YOUR DESTINY</text>
</svg>
